<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<style>

html,
body{
    margin:0;
    padding:0;
}

.page{
    position:relative;

    width:1191px;
    height:1684px;

    background-image:
        url("data:image/png;base64,{{ background }}");

    background-size:100% 100%;

    background-repeat:no-repeat;
}

.field{
    position:absolute;

    color:black;

    font-size:20px;
    font-weight:bold;
    font-family:
        "Noto Sans Devanagari",
        "Mukta",
        sans-serif;

    white-space:pre-wrap;
    .field{
    position:absolute;
    color:black;
    font-size:16px;
    line-height:1.2;
    overflow:hidden;
}
}

</style>

</head>

<body>

<div class="page">

{% for field in fields %}

<div
class="field"
style="
left:{{ field.x }}px;
top:{{ field.y }}px;
width:{{ field.width }}px;
height:{{ field.height }}px;
"
>
{{ field.value }}
</div>

{% endfor %}

</div>

</body>
</html>
